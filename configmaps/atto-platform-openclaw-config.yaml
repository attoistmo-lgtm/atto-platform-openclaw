apiVersion: v1
kind: ConfigMap
metadata:
  name: atto-platform-openclaw-config
  namespace: openclaw-system
data:
  openclaw.json: |
    {
      "gateway": {
        "mode": "local",
        "port": 3000,
        "bind": "lan",
        "auth": {
          "mode": "token",
          "token": "${OPENCLAW_MASTER_KEY}"
        },
        "controlUi": {
          "enabled": true,
          "allowedOrigins": ["http://openclaw.attoistmo.com.mx"]
        }
      },
      "agents": {
        "defaults": {
          "workspace": "/workspace"
        }
      },
      "models": {
        "providers": {
          "openai": {
            "apiKey": "${LITELLM_API_KEY}",
            "baseURL": "http://atto-platform-litellm-gateway.litellm-system.svc.cluster.local:4000/v1"
          }
        }
      },
      "channels": {},
      "env": {
        "LITELLM_API_KEY": "${LITELLM_API_KEY}",
        "OPENCLAW_MASTER_KEY": "${OPENCLAW_MASTER_KEY}",
        "REDIS_PASSWORD": "${REDIS_PASSWORD}"
      }
    }
