apiVersion: v1
kind: ConfigMap
metadata:
  name: atto-platform-openclaw-config
  namespace: openclaw-system
data:
  openclaw.json: |
    {
      "gateway": {
        "mode": "local",
        "port": 3000,
        "webchat": {
          "enabled": true,
          "port": 3001
        }
      },
      "agents": {
        "defaults": {
          "workspace": "/workspace",
          "model": {
            "primary": "openai/gpt-4o-mini"
          }
        }
      },
      "models": {
        "providers": {
          "openai": {
            "apiKey": "${LITELLM_API_KEY}",
            "baseURL": "http://atto-platform-litellm-gateway.litellm-system.svc.cluster.local:4000/v1"
          }
        }
      },
      "channels": {
        "telegram": {
          "enabled": false,
          "botToken": "${TELEGRAM_BOT_TOKEN}",
          "dmPolicy": "pairing"
        },
        "discord": {
          "enabled": false,
          "token": "${DISCORD_BOT_TOKEN}",
          "dmPolicy": "pairing"
        },
        "slack": {
          "enabled": false,
          "token": "${SLACK_BOT_TOKEN}",
          "dmPolicy": "pairing"
        },
        "whatsapp": {
          "enabled": false,
          "token": "${WHATSAPP_TOKEN}",
          "dmPolicy": "pairing"
        }
      },
      "memory": {
        "type": "filesystem",
        "path": "/workspace/memory"
      },
      "redis": {
        "enabled": true,
        "host": "atto-platform-redis-master.redis-system.svc.cluster.local",
        "port": 6379,
        "password": "${REDIS_PASSWORD}"
      }
    }
